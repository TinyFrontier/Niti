<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Niti is a focused workspace for job search and recruiting relationships."
    />
    <meta name="theme-color" content="#2B69EE" />
    <meta property="og:title" content="Niti · Career workspace" />
    <meta
      property="og:description"
      content="Keep vacancies, applications, interviews and professional relationships in one place."
    />
    <link rel="icon" type="image/svg+xml" href="/brand/niti-app-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const saved = localStorage.getItem("job-search-theme");
        const mode = saved === "light" || saved === "dark"
          ? saved
          : matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.mode = mode;
      })();
    </script>
    <title>Niti · Career workspace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
