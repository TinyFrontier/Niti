[project]
name = "job-search-backend"
version = "0.1.0"
description = "Job Search CRM API"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "granian[reload]>=1.6",
    "sqlalchemy>=2.0.30",
    "psycopg[binary]>=3.2",
    "alembic>=1.13",
    "pydantic[email]>=2.7",
    "pydantic-settings>=2.3",
    "python-multipart>=0.0.9",
    "pyjwt>=2.8",
    "argon2-cffi>=23.1",
    "rapidfuzz>=3.9",
]

[dependency-groups]
dev = [
    "ruff>=0.5",
    "pytest>=8.2",
    "httpx>=0.27",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# autogenerated migrations may exceed line length
"alembic/versions/*" = ["E501"]
